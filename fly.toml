app = "hippo-app"
primary_region = "syd"

[build]
  dockerfile = "Dockerfile"

[env]
  HIPPO_ENV = "prod"
  HIPPO_ROLE = "all"
  HIPPO_HOST = "0.0.0.0"
  HIPPO_PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]
