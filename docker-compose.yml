services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hippo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hippo"]
      interval: 2s
      timeout: 2s
      retries: 15
    volumes:
      - hippo-postgres-data:/var/lib/postgresql/data

volumes:
  hippo-postgres-data:
