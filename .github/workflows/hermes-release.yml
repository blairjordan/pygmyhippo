name: Hermes release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { ref: ${{ github.event.release.tag_name }} }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: npm ci
      - run: npm run build
      - run: npm run test:hermes-registry
      - run: python -m pip install -r examples/hermes-runner/requirements.txt
      - run: npm run test:hermes-runner
      - run: docker build -t pygmyhippo-hermes-runner:${{ github.event.release.tag_name }} examples/hermes-runner

  publish:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm trusted publishing/OIDC; configure this repository once in npm.
      packages: write
    steps:
      - uses: actions/checkout@v4
        with: { ref: ${{ github.event.release.tag_name }} }
      - uses: actions/setup-node@v4
        with: { node-version: 22, registry-url: https://registry.npmjs.org }
      - name: Verify release tag matches npm package version
        run: test "v$(node -p \"require('./packages/hermes/package.json').version\")" = "${{ github.event.release.tag_name }}"
      - run: npm ci
      - run: npm run build --workspace=pygmyhippo-hermes
      - run: npm publish --workspace=pygmyhippo-hermes --access public --provenance
      - run: HERMES_REGISTRY_VERSION="${{ github.event.release.tag_name }}"; HERMES_REGISTRY_VERSION="${HERMES_REGISTRY_VERSION#v}"; export HERMES_REGISTRY_VERSION; npm run test:hermes-registry
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: examples/hermes-runner
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pygmyhippo-hermes-runner:${{ github.event.release.tag_name }}
            ghcr.io/${{ github.repository_owner }}/pygmyhippo-hermes-runner:latest
